services:
  db:
    image: postgres:16-alpine
    container_name: kargo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kargo
      POSTGRES_PASSWORD: kargo
      POSTGRES_DB: kargo
    ports:
      - '5432:5432'
    volumes:
      - kargo_pg_data:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
      - ./db/seed:/seed:ro
      - ./db/init/00-run-migrations.sh:/docker-entrypoint-initdb.d/00-run-migrations.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kargo -d kargo']
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: kargo-postgrest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      PGRST_DB_URI: postgres://authenticator:kargo_authenticator@db:5432/kargo
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_EXTRA_SEARCH_PATH: public,audit
      PGRST_JWT_SECRET: kargo-dev-jwt-secret-min-32-chars!!
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
      PGRST_DB_MAX_ROWS: '1000'
    # RPC: POST /rpc/auth_login  |  Tablolar: GET /cargos, /accounts, ...

volumes:
  kargo_pg_data:
