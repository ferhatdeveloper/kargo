# Dokploy production — Compose Path: ./docker-compose.yml
# Domain: Dokploy UI → Domains sekmesinden portal servisine (port 80) bağlayın.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-navlun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-navlun}
      POSTGRES_DB: ${POSTGRES_DB:-navlun}
    volumes:
      - navlun_pg_data:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
      - ./db/seed:/seed:ro
      - ./db/init/00-run-migrations.sh:/docker-entrypoint-initdb.d/00-run-migrations.sh:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-navlun} -d ${POSTGRES_DB:-navlun}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dokploy-network
      - internal

  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:navlun_authenticator@db:5432/${POSTGRES_DB:-navlun}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_EXTRA_SEARCH_PATH: public,audit
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-navlun-change-me-in-production-min-32-chars}
      PGRST_DB_MAX_ROWS: '1000'
    networks:
      - internal

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_API_BACKEND: postgrest
    restart: unless-stopped
    depends_on:
      - postgrest
    expose:
      - '80'
    networks:
      - dokploy-network
      - internal

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge

volumes:
  navlun_pg_data:
