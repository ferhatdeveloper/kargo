# Dokploy — Navlun kargo paneli (RetailEX ile aynı sunucuda çakışmaz)
#
# RetailEX (ferhatdeveloper/RetailEX) ile uyum:
#   - Ağ: berqenas_net (RetailEX ile paylaşılır; dokploy-network değil)
#   - Servis adları: navlun_* öneki (postgrest_merkez, saas_postgres ile karışmaz)
#   - Volume: navlun_pg_data (saas_postgres_data'dan ayrı)
#   - Host portu YOK — RetailEX 5432 / 3002–3020 / 8080 kullanır
#
# Dokploy ayarları:
#   Compose Path: ./docker-compose.dokploy.yml
#   Domain → navlun_portal servisi, port 80
#
version: "3.9"

services:
  navlun_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NAVLUN_POSTGRES_USER:-navlun}
      POSTGRES_PASSWORD: ${NAVLUN_POSTGRES_PASSWORD:-Yq7xwQpt6c}
      POSTGRES_DB: ${NAVLUN_POSTGRES_DB:-navlun}
    volumes:
      - navlun_pg_data:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
      - ./db/seed:/seed:ro
      - ./db/init/00-run-migrations.sh:/docker-entrypoint-initdb.d/00-run-migrations.sh:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${NAVLUN_POSTGRES_USER:-navlun} -d ${NAVLUN_POSTGRES_DB:-navlun}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - navlun_internal

  navlun_postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      navlun_db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:navlun_authenticator@navlun_db:5432/${NAVLUN_POSTGRES_DB:-navlun}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_EXTRA_SEARCH_PATH: public,audit
      PGRST_SERVER_HOST: "0.0.0.0"
      PGRST_SERVER_PORT: "3000"
      PGRST_JWT_SECRET: ${NAVLUN_PGRST_JWT_SECRET:?NAVLUN_PGRST_JWT_SECRET is required}
      PGRST_DB_MAX_ROWS: '1000'
    networks:
      - navlun_internal

  navlun_portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_API_BACKEND: postgrest
    image: navlun-portal:latest
    restart: unless-stopped
    depends_on:
      - navlun_postgrest
    expose:
      - '80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - berqenas_net
      - navlun_internal

networks:
  berqenas_net:
    external: true
    name: berqenas_net
  navlun_internal:
    driver: bridge

volumes:
  navlun_pg_data:
